<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MovieBoxBD - Smart Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Hind Siliguri', sans-serif; background: #0a0a0f; color: #e0e0e0; min-height: 100vh; }
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        h1 { text-align: center; color: #e50914; margin-bottom: 5px; font-size: 26px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 25px; font-size: 14px; }
        .panel { background: #12121c; border: 1px solid rgba(229, 9, 20, 0.2); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #fff; font-size: 14px; }
        input[type="text"], select { width: 100%; padding: 12px; background: #0a0a0f; border: 1px solid #333; border-radius: 8px; color: #fff; font-family: inherit; font-size: 14px; margin-bottom: 15px; }
        input:focus, select:focus { outline: none; border-color: #e50914; }
        .btn { background: linear-gradient(135deg, #e50914, #ff3030); color: #fff; border: none; padding: 12px 20px; border-radius: 8px; font-weight: 700; cursor: pointer; font-family: inherit; font-size: 14px; display: inline-flex; align-items: center; gap: 8px; transition: 0.3s; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(229, 9, 20, 0.4); }
        .btn-green { background: linear-gradient(135deg, #4caf50, #2e7d32); }
        .btn-blue { background: linear-gradient(135deg, #2196f3, #1565c0); margin-top: 10px; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .search-box { display: flex; gap: 10px; margin-bottom: 15px; }
        .search-box input { margin-bottom: 0; }
        .results-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; margin-top: 15px; }
        .result-card { cursor: pointer; text-align: center; transition: transform 0.2s; border: 2px solid transparent; border-radius: 10px; padding: 8px; background: rgba(255,255,255,0.02); }
        .result-card:hover { transform: scale(1.03); border-color: rgba(229, 9, 20, 0.3); background: rgba(229,9,20,0.05); }
        .result-card img { width: 100%; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); aspect-ratio: 2/3; object-fit: cover; }
        .result-card p { font-size: 11px; margin-top: 6px; color: #ccc; line-height: 1.3; }
        .result-card .year { color: #e50914; font-weight: 600; }
        .status-msg { text-align: center; padding: 20px; color: #888; font-size: 14px; }
        .status-msg.error { color: #ff5252; }
        .status-msg.loading { color: #ffd700; }
        .ep-manager { display: none; margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px; }
        .ep-row { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; }
        .ep-row input { margin-bottom: 0; }
        .ep-remove { background: #ff5252; border: none; color: white; width: 36px; height: 36px; min-width: 36px; border-radius: 50%; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; }
        .output-area { width: 100%; height: 250px; background: #050505; color: #00ff00; border: 1px solid #333; border-radius: 8px; padding: 15px; font-family: 'Courier New', monospace; margin-top: 15px; font-size: 12px; resize: vertical; }
        .selected-badge { background: linear-gradient(135deg, #4caf50, #2e7d32); color: #fff; padding: 8px 15px; border-radius: 8px; font-size: 13px; display: inline-flex; align-items: center; gap: 8px; margin-bottom: 15px; }
        .warn { color: #ff9800; font-size: 12px; margin-top: -10px; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h1><i class="fas fa-robot"></i> MovieBoxBD Generator</h1>
    <p class="subtitle">মুভি/সিরিজের নাম দিলেই অটো পোস্ট রেডি!</p>

    <div class="panel">
        <label><i class="fas fa-tv"></i> টাইপ সিলেক্ট করুন</label>
        <select id="typeSelect">
            <option value="movie">🎬 মুভি</option>
            <option value="tv">📺 ওয়েব সিরিজ</option>
        </select>

        <label><i class="fas fa-search"></i> নাম লিখে সার্চ করুন (English)</label>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="যেমন: Squid Game">
            <button class="btn" id="searchBtn" onclick="doSearch()"><i class="fas fa-search"></i> সার্চ</button>
        </div>

        <div id="resultsArea">
            <div class="status-msg"><i class="fas fa-film"></i> উপরে নাম লিখে সার্চ বাটনে ক্লিক করুন</div>
        </div>
    </div>

    <div class="panel" id="setupPanel" style="display:none;">
        <h3 style="margin-bottom:15px; color:#e50914; font-size:18px;"><i class="fas fa-cog"></i> পোস্ট সেটআপ</h3>
        <div id="selectedInfo" class="selected-badge"></div>

        <label>বাংলা টাইটেল (ঐচ্ছিক)</label>
        <input type="text" id="bnTitle" placeholder="স্কুইড গেম">

        <label><i class="fas fa-ad"></i> Adsterra Direct Ad Link ১</label>
        <input type="text" id="ad1" placeholder="https://adsterra-link-1.com...">

        <label><i class="fas fa-ad"></i> Adsterra Direct Ad Link ২</label>
        <input type="text" id="ad2" placeholder="https://adsterra-link-2.com...">

        <div id="movieDlBox">
            <label><i class="fab fa-telegram"></i> Telegram Download Link (পুরো মুভি বা সিজন)</label>
            <p class="warn">⚠️ এই লিংকটি না দিলে ডাউনলোড বাটন কাজ করবে না!</p>
            <input type="text" id="mainDl" placeholder="https://t.me/yourbot/...">
        </div>

        <div class="ep-manager" id="epManager">
            <h3 style="color:#9c27b0; margin-bottom:10px; font-size:16px;"><i class="fas fa-list-ol"></i> এপিসোড যোগ করুন</h3>
            <div id="epList"></div>
            <button class="btn btn-blue" onclick="addEp()"><i class="fas fa-plus"></i> নতুন এপিসোড যোগ</button>
        </div>

        <br>
        <button class="btn" id="genBtn" onclick="generate()" style="width:100%; justify-content:center; font-size:16px; padding:15px;">
            <i class="fas fa-magic"></i> HTML জেনারেট করুন
        </button>

        <textarea class="output-area" id="codeOutput" style="display:none;" readonly></textarea>
        <br>
        <button class="btn btn-green" id="copyBtn" style="display:none; width:100%; justify-content:center; margin-top:10px;" onclick="copyCode()">
            <i class="fas fa-copy"></i> কোড কপি করুন
        </button>
    </div>
</div>

<script>
    const API_KEY = 'c0d37f0558b975f73bd73328e07324eb';
    const IMG = 'https://image.tmdb.org/t/p/w500';
    const IMG_HD = 'https://image.tmdb.org/t/p/original';
    let selectedItem = null;
    let isTV = false;

    document.getElementById('searchInput').addEventListener('keypress', function(e) { if (e.key === 'Enter') doSearch(); });

    async function doSearch() {
        const query = document.getElementById('searchInput').value.trim();
        const type = document.getElementById('typeSelect').value;
        isTV = type === 'tv';
        const area = document.getElementById('resultsArea');
        const btn = document.getElementById('searchBtn');
        if (!query) { area.innerHTML = '<div class="status-msg error"><i class="fas fa-exclamation-circle"></i> নাম লিখুন!</div>'; return; }
        btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> খুঁজছি...';
        area.innerHTML = '<div class="status-msg loading"><i class="fas fa-spinner fa-spin"></i> সার্চ হচ্ছে...</div>';
        try {
            const res = await fetch('https://api.themoviedb.org/3/search/' + type + '?api_key=' + API_KEY + '&query=' + encodeURIComponent(query) + '&language=bn-BD');
            if (!res.ok) throw new Error('API Error'); 
            const data = await res.json();
            if (!data.results || data.results.length === 0) { area.innerHTML = '<div class="status-msg error">কিছু পাওয়া যায়নি!</div>'; btn.disabled = false; btn.innerHTML = '<i class="fas fa-search"></i> সার্চ'; return; }
            let html = '<div class="results-grid">';
            data.results.slice(0, 10).forEach(item => {
                if (!item.poster_path) return; 
                const title = item.title || item.name; 
                const year = (item.release_date || item.first_air_date || '').substring(0, 4);
                html += '<div class="result-card" onclick="selectItem('+ item.id +',\''+ title.replace(/'/g, "\\'") +'\',\''+ year +'\',\''+ item.poster_path +'\')"><img src="'+ IMG + item.poster_path +'" alt="'+ title +'" loading="lazy"><p>'+ title +'</p><p class="year">'+ year +'</p></div>';
            }); 
            area.innerHTML = html + '</div>';
        } catch (err) { area.innerHTML = '<div class="status-msg error">সার্চ ব্যর্থ! ইন্টারনেট চেক করুন।</div>'; }
        btn.disabled = false; btn.innerHTML = '<i class="fas fa-search"></i> সার্চ';
    }

    function selectItem(id, title, year, poster) {
        selectedItem = { id: id, title: title, year: year, poster_path: poster };
        document.getElementById('selectedInfo').innerHTML = '<i class="fas fa-check-circle"></i> সিলেক্টেড: <strong>'+ title +'</strong> ('+ year +')';
        document.getElementById('setupPanel').style.display = 'block'; 
        document.getElementById('setupPanel').scrollIntoView({ behavior: 'smooth' });
        if (isTV) { 
            document.getElementById('epManager').style.display = 'block'; 
            document.getElementById('movieDlBox').querySelector('label').innerText = '📱 Telegram Link (পুরো সিজন)'; 
            document.getElementById('epList').innerHTML = ''; 
            addEp(); 
        } else { 
            document.getElementById('epManager').style.display = 'none'; 
            document.getElementById('movieDlBox').querySelector('label').innerText = '📱 Telegram Download Link (মুভি)'; 
        }
    }

    function addEp() {
        const list = document.getElementById('epList'); const num = list.children.length + 1; const div = document.createElement('div'); div.className = 'ep-row';
        div.innerHTML = '<input type="text" placeholder="এপিসোড '+num+' নাম" class="ep-name" style="flex:1"><input type="text" placeholder="টেলিগ্রাম লিংক" class="ep-link" style="flex:2"><button class="ep-remove" onclick="this.parentElement.remove()"><i class="fas fa-times"></i></button>';
        list.appendChild(div);
    }

    async function generate() {
        if (!selectedItem) return alert('আগে মুভি সিলেক্ট করুন!');
        const genBtn = document.getElementById('genBtn'); genBtn.disabled = true; genBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> তথ্য আনা হচ্ছে...';
        const id = selectedItem.id; const type = isTV ? 'tv' : 'movie'; const bnTitle = document.getElementById('bnTitle').value.trim();
        const adLink1 = document.getElementById('ad1').value.trim() || '#'; const adLink2 = document.getElementById('ad2').value.trim() || '#';
        const mainDlLink = document.getElementById('mainDl').value.trim() || '#';
        try {
            const detRes = await fetch('https://api.themoviedb.org/3/'+type+'/'+id+'?api_key='+API_KEY+'&language=bn-BD'); const det = await detRes.json();
            const title = bnTitle || (det.title || det.name); const origTitle = det.title || det.name; const rating = det.vote_average.toFixed(1);
            const overview = det.overview || 'কোনো বিবরণ পাওয়া যায়নি।'; const poster = IMG + det.poster_path; const genres = det.genres.map(g => g.name).join(', ');
            const year = (det.release_date || det.first_air_date || '').substring(0, 4); const typeLabel = isTV ? 'ওয়েব সিরিজ' : 'মুভি'; const badgeLabel = isTV ? 'SERIES' : 'MOVIE';
            
            // Screenshot Fetch (Added language param for better results)
            const imgRes = await fetch('https://api.themoviedb.org/3/'+type+'/'+id+'/images?api_key='+API_KEY+'&include_image_language=en,null'); 
            const imgData = await imgRes.json();
            let screens = '';
            if (imgData.backdrops && imgData.backdrops.length > 0) {
                screens = imgData.backdrops.slice(0, 3).map(i => '<div class="screenshot-item"><img src="'+IMG_HD+i.file_path+'" alt="Screenshot"></div>').join('');
            } else {
                // Fallback if no screenshots found
                screens = '<div class="screenshot-item"><img src="'+poster+'" alt="Poster"></div><div class="screenshot-item"><img src="'+poster+'" alt="Poster"></div><div class="screenshot-item"><img src="'+poster+'" alt="Poster"></div>';
            }
            
            // Episode JSON Array
            let epArrStr = '[]';
            if (isTV) {
                const names = document.querySelectorAll('.ep-name'); const links = document.querySelectorAll('.ep-link');
                let epArr = []; 
                names.forEach((inp, i) => { epArr.push({ name: inp.value.trim() || 'এপিসোড '+(i+1), link: links[i].value.trim() || '#' }); });
                epArrStr = JSON.stringify(epArr);
            }

            let fullDlBtn = '';
            if (mainDlLink !== '#') { fullDlBtn = '<h2 class="section-title"><i class="fas fa-download"></i> ডাউনলোড</h2><div class="download-section"><button class="download-btn" data-link="'+mainDlLink+'"><i class="fas fa-download"></i> ' + (isTV ? 'পুরো সিজন ডাউনলোড' : 'মুভি ডাউনলোড') + '</button></div>'; }
            
            let epSection = '';
            if(isTV) {
                epSection = '<h2 class="section-title"><i class="fas fa-list-ol"></i> এপিসোড তালিকা</h2><div class="episode-section"><div class="episode-grid" id="ep-grid"></div></div>';
            }

            let finalCode = '<!DOCTYPE html>\n<html lang="bn">\n<head>\n<meta charset="UTF-8">\n<meta name="viewport" content="width=device-width, initial-scale=1.0">\n<title>'+title+' - MovieBoxBD</title>\n<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet">\n<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">\n<style>\n*{margin:0;padding:0;box-sizing:border-box}body{font-family:\'Hind Siliguri\',sans-serif;background:#0a0a0f;color:#e0e0e0;min-height:100vh;overflow-x:hidden}.site-header{background:linear-gradient(135deg,#0d0d15,#1a1a2e);border-bottom:2px solid #e50914;padding:12px 0;position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(229,9,20,0.15)}.header-inner{max-width:1200px;margin:0 auto;padding:0 16px;display:flex;align-items:center;justify-content:space-between}.logo{display:flex;align-items:center;gap:10px;text-decoration:none}.logo-icon{width:42px;height:42px;background:linear-gradient(135deg,#e50914,#ff6b35);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff}.logo-text{font-size:22px;font-weight:700;color:#fff}.logo-text span{color:#e50914}.movie-container{max-width:1200px;margin:0 auto;padding:24px 16px 60px}.movie-hero{display:grid;grid-template-columns:280px 1fr;gap:30px;background:linear-gradient(145deg,#12121c,#1a1a2e);border-radius:16px;padding:24px;border:1px solid rgba(229,9,20,0.1);position:relative;overflow:hidden}.movie-hero::before{content:\'\';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#e50914,#ff6b35,#e50914)}.poster-wrap{position:relative;border-radius:12px;overflow:hidden;box-shadow:0 8px 30px rgba(0,0,0,0.5);aspect-ratio:2/3}.poster-wrap img{width:100%;height:100%;object-fit:cover;display:block}.poster-badge{position:absolute;top:12px;left:12px;background:linear-gradient(135deg,#e50914,#ff3030);color:#fff;padding:4px 12p
